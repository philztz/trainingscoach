function getStravaToken(){return JSON.parse(localStorage.getItem("strava")||"null");}

// Handle OAuth callback via URL hash
function handleHashParams(){
  const hash=window.location.hash.slice(1);
  if(!hash)return;
  const p=new URLSearchParams(hash);
  if(p.get("strava_token")){
    setStravaToken({access_token:p.get("strava_token"),refresh_token:p.get("strava_refresh"),expires_at:parseInt(p.get("strava_expires")||"0"),athlete:p.get("strava_athlete")||""});
    window.history.replaceState(null,"","/");
    S.stravaMsg="✅ Strava verbunden! Hallo "+p.get("strava_athlete")+"!";
    render();
    setTimeout(()=>{S.stravaMsg=null;render();},3000);
  }
  if(p.get("strava_error")){
    S.stravaMsg="❌ Strava Fehler: "+p.get("strava_error");
    window.history.replaceState(null,"","/");
    render();
    setTimeout(()=>{S.stravaMsg=null;render();},4000);
  }
}

async function loadStravaActivities(){
  const st=getStravaToken();
  if(!st){window.location.href="/api/strava-auth";return;}
  S.stravaLoading=true;S.stravaActivities=null;render();
  try{
    const r=await fetch("/api/strava-activities",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({access_token:st.access_token,refresh_token:st.refresh_token,expires_at:st.expires_at})
    });
    const data=await r.json();
    if(!r.ok)throw new Error(data.error||"Fehler");
    if(data.new_token){const ns={...st,access_token:data.new_token};setStravaToken(ns);}
    S.stravaActivities=data.activities||[];
  }catch(e){S.stravaMsg="❌ "+e.message;}
  S.stravaLoading=false;render();
}

  S.lf.hm=a.hm?.toString()||"";
  S.lf.hr=a.hr?.toString()||"";
  S.lf.aL=a.label||"";
  if(a.type)S.lf.aT=null; // keep planned type, just fill metrics
  S.stravaActivities=null;

JSON ONLY:{"summary":"Analyse","fitness_trend":"steigend|stabil|abnehmend","recovery_status":"erholt|moderat|muede|ueberbelastet","load_balance":"optimal|zu_hoch|zu_niedrig","adjustments":[{"date":"YYYY-MM-DD","label":"T","type":"ride|intervals|strength|run|rest|mobility|hiit|test","description":"D","duration":90,"zone":"Z2","rpe_target":"5-6","adjustment_reason":"R"}]}`;

}

function rDev(){
  const s=el("div");s.appendChild(el("div","sec-lbl","Abweichung?"));
  if(!S.lf.aT){const b=el("button","dev-empty","+ Abweichung eintragen");b.onclick=()=>{S.lf.aT="ride";render();};s.appendChild(b);}
  else{
    const c=el("div","dev-card");c.innerHTML='<div class="dev-title">🔄 Abweichung</div>';
    const ps=el("div","pills");WTs.forEach(([t,ic,lb])=>{const m=TM[t]||TM.rest;const p=el("button","pill"+(S.lf.aT===t?" on":""),`${ic} ${lb}`);p.style.setProperty("--c",m.c);p.style.setProperty("--bg",m.b);p.onclick=()=>{S.lf.aT=t;render();};ps.appendChild(p);});
    c.appendChild(ps);
    const li=el("input","finput");li.placeholder="Beschreibung";li.value=S.lf.aL;li.oninput=e=>S.lf.aL=e.target.value;li.style.marginBottom="10px";c.appendChild(li);
    const g=el("div","g2");[["aDur","⏱ Dauer","90"],["aKm","📍 km","40"],["aHm","⛰️ Hm","300"],["aHr","❤️ HF","145"],["aRpe","💪 RPE","7"]].forEach(([k,l,p])=>{const dd=document.createElement("div");dd.innerHTML=`<div class="glbl">${l}</div>`;const i=el("input","ginput");i.type="number";i.placeholder=p;i.value=S.lf[k]||"";i.oninput=e=>S.lf[k]=e.target.value;dd.appendChild(i);g.appendChild(dd);});
    c.appendChild(g);
    const r=el("button","rem-btn","✕ Entfernen");r.onclick=()=>{S.lf.aT=null;S.lf.aL="";render();};c.appendChild(r);s.appendChild(c);
  }
  return s;
}
function rExtra(){
  const s=el("div");const h=el("div","sec-hdr");h.appendChild(el("span","sec-lbl","Zusaetzliche Einheiten"));
  const ab=el("button","add-btn","+ Hinzufuegen");ab.onclick=()=>{S.ex.push({type:"ride",label:"",dur:"",km:"",hm:"",hr:"",rpe:""});render();};h.appendChild(ab);s.appendChild(h);
  S.ex.forEach((ex,i)=>{
    const c=el("div","extra-card");
    const et=el("div","extra-title");et.innerHTML=`➕ Einheit ${i+1} <button style="float:right;background:none;border:none;color:#475569;font-family:inherit;font-size:11px;cursor:pointer" onclick="remEx(${i})">✕</button>`;c.appendChild(et);
    const ps=el("div","pills");WTs.forEach(([t,ic,lb])=>{const m=TM[t]||TM.rest;const p=el("button","pill"+(ex.type===t?" on":""),`${ic} ${lb}`);p.style.setProperty("--c",m.c);p.style.setProperty("--bg",m.b);p.onclick=()=>{S.ex[i].type=t;render();};ps.appendChild(p);});c.appendChild(ps);
    const li=el("input","finput");li.placeholder="Beschreibung";li.value=ex.label;li.oninput=e=>S.ex[i].label=e.target.value;li.style.marginBottom="8px";c.appendChild(li);
    const g=el("div","g2");[["dur","⏱ Min","90"],["km","📍 km","40"],["hm","⛰️ Hm","300"],["hr","❤️ HF","145"],["rpe","💪 RPE","7"]].forEach(([k,l,p])=>{const dd=document.createElement("div");dd.innerHTML=`<div class="glbl">${l}</div>`;const inp=el("input","ginput");inp.type="number";inp.placeholder=p;inp.value=ex[k]||"";inp.oninput=e=>S.ex[i][k]=e.target.value;dd.appendChild(inp);g.appendChild(dd);});c.appendChild(g);s.appendChild(c);
  });return s;
}
function remEx(i){S.ex.splice(i,1);render();}
function rPlan(){
  const d=el("div");d.appendChild(el("div","plan-title","Gesamtplan"));
  PLAN.forEach(p=>{
    const ov=S.ov[p.date];const w=ov||p;const m=TM[w.type]||TM.rest;
    const isT=p.date===today;const isPast=p.date<today;const hasLog=!!S.logs[p.date];
    const item=el("button","pi"+(isT?" is-today":"")+(isPast?" past":""));
    if(isT)item.style.borderColor=m.c+"44";
    item.innerHTML=`<span class="pi-icon">${m.i}</span><div class="pi-body"><div class="pi-date">${FD(p.date)}</div><div class="pi-label" style="color:${isT?m.c:"#e2e8f0"}">${ov?"AI ":""}${w.label}</div><div class="pi-phase">${p.phase}</div></div><div class="pi-right">${hasLog?'<span class="pi-check">✓</span>':""} ${w.duration>0?`<span class="pi-dur">${w.duration}'</span>`:""}</div>`;
    item.onclick=()=>{S.sel=p.date;S.view="today";LLF();render();};d.appendChild(item);
  });return d;
}
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
handleHashParams();
LLF();render();

</script>
