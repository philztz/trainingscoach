<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Trainingscoach"/>
<meta name="theme-color" content="#0d1b3e"/>
<title>Trainingscoach</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<style>
:root{
  --bg:#0d1b3e;
  --bg2:#0f2348;
  --bg3:#162d56;
  --bg4:#1c3566;
  --border:#1e3a6e;
  --border2:#2a4a7f;
  --cyan:#00d4c8;
  --cyan2:#00b8ad;
  --blue:#4a9eff;
  --blue2:#2d7dd2;
  --text:#e8f4ff;
  --text2:#8aabcc;
  --text3:#4a6a8a;
  --grad:linear-gradient(135deg,#00d4c8,#4a9eff);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
input,button,textarea{-webkit-appearance:none;font-size:16px!important;font-family:inherit}
button{cursor:pointer}
.app{min-height:100vh;padding-bottom:80px}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px}
.header-sub{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.header-title{font-size:20px;font-weight:600;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.header-desc{font-size:12px;color:var(--text3)}
.header-btn{background:none;border:1px solid var(--border2);border-radius:20px;padding:4px 12px;color:var(--text3);font-size:11px}

/* Date scroller */
.date-scroll{overflow-x:auto;display:flex;gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.date-btn{flex-shrink:0;width:50px;padding:8px 4px;border-radius:12px;border:1.5px solid transparent;background:var(--bg3);text-align:center;position:relative}
.date-btn.selected{border-color:var(--c,#00d4c8);background:var(--bg4)}
.d-day{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.date-btn.is-today .d-day{font-weight:700;color:var(--c,#00d4c8)}
.d-icon{font-size:15px;margin:4px 0 2px}
.d-num{font-size:11px;color:var(--text2);font-weight:500}
.date-btn.selected .d-num{color:var(--c,#00d4c8)}
.d-dot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--cyan)}
.d-ai{position:absolute;top:3px;left:3px;font-size:8px}

/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px 2px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:11px;font-family:inherit}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-icon{font-size:15px;display:block;margin-bottom:2px}

/* Content */
.content{padding:16px;max-width:480px;margin:0 auto}

/* Workout card */
.wcard{border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--border)}
.wcard-hdr{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.wcard-icon{font-size:32px}
.wcard-title{font-size:17px;font-weight:600}
.wcard-date{font-size:11px;color:var(--text3);margin-top:2px}
.wcard-desc{color:var(--text2);font-size:13px;line-height:1.65;margin-bottom:14px}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{background:var(--bg3);padding:4px 10px;border-radius:20px;font-size:11px;color:var(--text2);border:1px solid var(--border)}
.ai-badge{margin-left:auto;font-size:10px;background:var(--bg3);color:#818cf8;padding:3px 8px;border-radius:12px;border:1px solid #818cf833}
.ai-reason{background:var(--bg2);border:1px solid #818cf833;border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:#818cf8}

/* Log summary */
.log-sum{background:rgba(0,212,200,.08);border:1px solid rgba(0,212,200,.2);border-radius:12px;padding:12px;margin-bottom:14px}
.log-sum-title{font-size:10px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.log-tags{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:rgba(0,212,200,.8)}
.log-dev{margin-top:8px;font-size:12px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:8px;padding:6px 10px;color:#f97316}
.log-extra{margin-top:6px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text2)}

/* AI section */
.ai-sec{background:var(--bg2);border:1px solid rgba(129,140,248,.2);border-radius:14px;padding:14px}
.ai-title{font-size:12px;color:#818cf8;font-weight:600;margin-bottom:3px}
.ai-sub{font-size:11px;color:var(--text3);margin-bottom:10px}
.ai-btn{width:100%;padding:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:10px;font-size:13px;font-weight:600}
.ai-load{text-align:center;padding:20px;color:#818cf8;font-size:13px}
.ai-err{color:#fb7185;font-size:12px;padding:8px}
.ai-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ai-b{font-size:11px;padding:3px 10px;border-radius:20px}
.ai-sum{background:rgba(79,70,229,.1);border:1px solid rgba(129,140,248,.2);border-radius:10px;padding:12px;margin-bottom:10px;font-size:12px;color:#c7d2fe;line-height:1.7}
.ai-list{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.ai-adj{border-radius:10px;padding:10px 12px}
.ai-adj-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.ai-adj-title{font-size:12px;font-weight:600}
.ai-adj-date{font-size:10px;color:var(--text3)}
.ai-adj-desc{font-size:11px;color:var(--text2);margin-bottom:3px;line-height:1.5}
.ai-adj-reason{font-size:10px;color:#818cf8}
.ai-none{font-size:12px;color:var(--cyan);text-align:center;padding:8px}
.ai-count{font-size:11px;color:var(--text3);margin-bottom:8px}
.ai-actions{display:flex;gap:8px}
.ai-apply{flex:1;padding:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600}
.ai-disc{flex:1;padding:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border:none;border-radius:8px;font-size:13px}
.no-w{text-align:center;padding:40px;color:var(--text3)}

/* Log form */
.log-title{font-size:13px;color:var(--cyan);margin-bottom:14px;font-weight:600}
.plan-info{background:var(--bg3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--text2);border:1px solid var(--border)}
.cb-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.cb.on{border-color:var(--cyan);background:var(--cyan)}
.field{margin-bottom:12px}
.field-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
.finput{width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none}
.finput:focus{border-color:var(--cyan)}
.frow{display:flex;gap:6px}
.fbtn{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);font-size:15px}
.fbtn.on{border-color:var(--cyan);background:rgba(0,212,200,.1)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sec-lbl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.add-btn{font-size:11px;color:var(--cyan);background:none;border:1px solid rgba(0,212,200,.3);border-radius:20px;padding:3px 10px}
.save-btn{width:100%;padding:14px;background:var(--grad);color:var(--bg);border:none;border-radius:12px;font-size:15px;font-weight:700;margin-bottom:10px;letter-spacing:.3px}
.analyze-btn{width:100%;padding:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600}
.dev-empty{width:100%;padding:10px;background:var(--bg3);border:1px dashed var(--border2);border-radius:10px;color:var(--text3);font-size:13px;margin-top:6px}
.dev-card{background:var(--bg3);border:1px solid rgba(249,115,22,.3);border-radius:12px;padding:14px;margin-top:8px}
.dev-title{font-size:12px;color:#f97316;font-weight:600;margin-bottom:10px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-size:11px}
.pill.on{border-color:var(--c,#00d4c8);background:rgba(0,212,200,.1);color:var(--c,#00d4c8)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.glbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.ginput{width:100%;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.rem-btn{font-size:11px;color:var(--text3);background:none;border:none;margin-top:8px}
.extra-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.extra-title{font-size:12px;color:var(--cyan);font-weight:600;margin-bottom:10px}

/* Plan view */
.plan-title{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.pi{width:100%;display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;text-align:left}
.pi.is-today{border-color:rgba(0,212,200,.4);background:rgba(0,212,200,.05)}
.pi.past{opacity:.5}
.pi-icon{font-size:20px;flex-shrink:0}
.pi-body{flex:1;min-width:0}
.pi-date{font-size:10px;color:var(--text3)}
.pi-label{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-phase{font-size:10px;color:var(--text3)}
.pi-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.pi-check{font-size:10px;color:var(--cyan)}
.pi-dur{font-size:10px;color:var(--text3)}

/* Stats */
.stat-section{margin-bottom:22px}
.stat-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.ftp-current{text-align:center;padding:16px 0}
.ftp-value{font-size:48px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.ftp-unit{font-size:13px;color:var(--text3);margin-top:4px}
.ftp-date{font-size:10px;color:var(--text3);margin-top:4px}
.ftp-input-row{display:flex;gap:8px;margin-top:10px}
.ftp-input{flex:1;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;outline:none}
.ftp-save-btn{padding:10px 16px;background:var(--grad);color:var(--bg);border:none;border-radius:8px;font-size:13px;font-weight:700}
.zone-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.zone-row:last-child{border-bottom:none}
.zone-name{font-size:11px;color:var(--text2);width:100px;flex-shrink:0}
.zone-bar-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.zone-bar{height:100%;border-radius:3px}
.zone-watts{font-size:10px;color:var(--text3);width:80px;text-align:right;flex-shrink:0}
.chart-wrap{width:100%;overflow:hidden}
.chart-svg{width:100%;display:block}
.week-label{font-size:9px;fill:#4a6a8a;text-anchor:middle}
.bar-km{fill:#00d4c8}
.bar-hm{fill:#4a9eff}
.line-ftp{fill:none;stroke:#f97316;stroke-width:2}
.dot-ftp{fill:#f97316}
.chart-legend{display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--text3)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.no-data{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.trend-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.trend-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}

/* Coach */
.coach-intro{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.coach-examples{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.coach-ex-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:11px;font-family:inherit}
.coach-textarea{width:100%;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;resize:none;font-family:inherit;line-height:1.6;box-sizing:border-box}
.coach-textarea:focus{border-color:var(--cyan)}
.coach-send-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;margin-top:10px}
.coach-loading{text-align:center;padding:28px;color:#818cf8}
.coach-result{background:var(--bg2);border:1px solid rgba(129,140,248,.2);border-radius:14px;padding:14px;margin-top:14px}
.coach-result-title{font-size:12px;color:#818cf8;font-weight:600;margin-bottom:8px}
.coach-summary{background:rgba(79,70,229,.1);border:1px solid rgba(129,140,248,.2);border-radius:10px;padding:12px;margin-bottom:10px;font-size:13px;color:#c7d2fe;line-height:1.7}
.coach-changes{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:300px;overflow-y:auto}
.coach-change{border-radius:10px;padding:10px 12px}
.coach-change-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.coach-change-title{font-size:12px;font-weight:600}
.coach-change-date{font-size:10px;color:var(--text3)}
.coach-change-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:3px}
.coach-change-reason{font-size:10px;color:#818cf8}
.coach-no-changes{font-size:12px;color:var(--cyan);text-align:center;padding:8px}
.coach-actions{display:flex;gap:8px}
.coach-apply{flex:1;padding:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit}
.coach-discard{flex:1;padding:10px;background:var(--bg3);color:var(--text2);border:none;border-radius:8px;font-size:13px;font-family:inherit}
.coach-err{color:#fb7185;font-size:12px;padding:8px;margin-top:6px}
.coach-history{margin-top:18px}
.coach-hist-title{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.coach-hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px}
.coach-hist-date{font-size:10px;color:var(--text3);margin-bottom:3px}
.coach-hist-msg{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:3px}
.coach-hist-count{font-size:11px;color:#818cf8}

/* Settings overlay */
#so{display:none;position:fixed;inset:0;background:rgba(8,15,40,.9);z-index:9999;align-items:center;justify-content:center;padding:20px}
#so.open{display:flex}
.sbox{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:24px;width:100%;max-width:360px}
.sbox h2{color:var(--text);font-size:17px;margin-bottom:5px;font-weight:600}
.sbox p{color:var(--text2);font-size:13px;margin-bottom:18px;line-height:1.6}
.sinput{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
.ssave{width:100%;padding:13px;background:var(--grad);color:var(--bg);border:none;border-radius:10px;font-size:14px;font-weight:700;margin-bottom:8px}
.sclose{width:100%;padding:11px;background:var(--bg2);color:var(--text3);border:1px solid var(--border);border-radius:10px;font-size:13px}
.sst{font-size:12px;color:var(--cyan);margin-top:8px;text-align:center;min-height:18px}

/* Login screen */
#login-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:99999;align-items:center;justify-content:center;padding:24px}
#login-screen.show{display:flex}
.login-box{width:100%;max-width:340px;text-align:center}
.login-logo{width:96px;height:96px;border-radius:22px;object-fit:cover;margin:0 auto 20px;display:block;box-shadow:0 8px 32px rgba(0,212,200,.2)}
.login-title{font-size:22px;font-weight:600;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;color:var(--text);font-size:16px;outline:none;font-family:inherit;margin-bottom:12px;box-sizing:border-box;text-align:center;letter-spacing:2px}
.login-input:focus{border-color:var(--cyan)}
.login-btn{width:100%;padding:14px;background:var(--grad);color:var(--bg);border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;letter-spacing:.3px}
.login-btn:disabled{opacity:.4}
.login-err{font-size:13px;color:#fb7185;margin-top:10px;min-height:20px}
</style>
</head>
<body>

<div id="login-screen" class="show">
  <div class="login-box">
    <img class="login-logo" src="/icon-192.png" alt="Trainingscoach"/>
    <div class="login-title">Trainingscoach</div>
    <div class="login-sub">Bitte Passwort eingeben</div>
    <input id="pw-input" class="login-input" type="password" placeholder="Passwort..." 
           onkeydown="if(event.key==='Enter')doLogin()"/>
    <button id="pw-btn" class="login-btn" onclick="doLogin()">Einloggen</button>
    <div id="pw-err" class="login-err"></div>
  </div>
</div>

<div id="so">
  <div class="sbox">
    <h2>&#128273; API-Key einrichten</h2>
    <p>F&#252;r die KI-Analyse ben&#246;tigst du einen Anthropic API-Key.<br><br>
       Kostenlos erstellen auf:<br><b style="color:#818cf8">console.anthropic.com</b><br><br>
       (ca. 1&#8211;2&#8364;/Monat bei t&#228;glicher Nutzung)</p>
    <input id="aki" class="sinput" type="password" placeholder="sk-ant-..."/>
    <button class="ssave" onclick="saveApiKey()">&#128190; Key speichern</button>
    <button class="sclose" onclick="closeSettings()">Schlie&#223;en</button>
    <div id="sst" class="sst"></div>
  </div>
</div>
<div class="app" id="app"></div>
<script>


// ─── AUTH ────────────────────────────────────────────────────────────────────
function getSession(){try{const s=JSON.parse(localStorage.getItem("tc_session")||"null");if(s&&s.expires>Date.now())return s;}catch{}return null;}
function clearSession(){localStorage.removeItem("tc_session");}

async function doLogin(){
  const pw=document.getElementById("pw-input").value.trim();
  const btn=document.getElementById("pw-btn");
  const err=document.getElementById("pw-err");
  if(!pw){err.textContent="Bitte Passwort eingeben";return;}
  btn.disabled=true;btn.textContent="Prüfe...";err.textContent="";
  try{
    const r=await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
    const data=await r.json();
    if(!r.ok)throw new Error(data.error||"Falsches Passwort");
    localStorage.setItem("tc_session",JSON.stringify({token:data.token,expires:data.expires}));
    document.getElementById("login-screen").classList.remove("show");
    LLF();render();
  }catch(e){
    err.textContent=e.message;
    btn.disabled=false;btn.textContent="Einloggen";
    document.getElementById("pw-input").value="";

  try{
    const r=await fetch("/api/strava-activities",{

      body:JSON.stringify({access_token:st.access_token,refresh_token:st.refresh_token,expires_at:st.expires_at})

async function sendCoachRequest(){
  const text=S.coachText.trim();
  if(!text){S.coachErr="Bitte beschreibe die Änderung oder Einschränkung.";render();return;}
  const k=getApiKey();if(!k){openSettings();return;}
  S.coachL=true;S.coachResult=null;S.coachErr=null;render();

  const futurePlan=PLAN.filter(p=>p.date>=today).map(p=>{
    const ov=S.ov[p.date];
    return `${p.date} [${p.phase}]: ${(ov||p).label} | ${(ov||p).type} | ${(ov||p).duration}min | ${(ov||p).zone}`;
  }).join("\n");

  const recentLogs=Object.entries(S.logs).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7)
    .map(([d,l])=>`${d}: ${l.wl||l.wt} | ${l.dur||"?"}min ${l.km||"?"}km RPE${l.rpe||"?"} Gefühl${l.feel||"?"}/5`).join("\n");

  const prompt=`Du bist ein erfahrener Radsport-Trainer. Der Athlet teilt dir eine Änderung oder Einschränkung mit und du passt den gesamten verbleibenden Trainingsplan professionell an.

MITTEILUNG DES ATHLETEN:
"${text}"

AKTUELLES DATUM: ${today}

VERBLEIBENDER PLAN:
${futurePlan}

LETZTE TRAININGS:
${recentLogs}

TRAININGSKONTEXT:
- Vereinstraining jeden Mittwoch (60km Z2 + Peaks) – nur ändern wenn explizit nötig
- Trainingslager 20.–26.05. – nur verschieben wenn absolut nötig
- Prinzip: 80/20, Progressive Overload, Supercompensation
- FTP-Aufbau als Hauptziel

ANWEISUNG:
Analysiere die Mitteilung des Athleten. Passe ALLE betroffenen Einheiten im Plan an. Berücksichtige:
1. Zeitliche Einschränkungen (Reise, Besuche, Termine) → Einheiten kürzen, verschieben oder durch kürzere Alternativen ersetzen
2. Gesundheitliche Einschränkungen (Krankheit, Verletzung, Müdigkeit) → Volumen & Intensität reduzieren, Erholung priorisieren
3. Positive Änderungen (mehr Zeit, Motivation) → Volumen moderat steigern
4. Passe nach der Einschränkungsphase den Wiederaufbau an (nicht zu schnell hochfahren!)

Antworte NUR mit diesem JSON ohne Text davor/danach:
{"summary":"2-3 Sätze: Was hast du verstanden und wie reagierst du darauf (deutsch, direkt zum Athleten sprechen)","adjustments":[{"date":"YYYY-MM-DD","label":"Titel","type":"ride|intervals|strength|run|rest|mobility|hiit|test","description":"Detaillierte Beschreibung","duration":90,"zone":"Z2","rpe_target":"5-6","adjustment_reason":"Kurze Begründung"}]}`;

  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":k},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:8000,messages:[{role:"user",content:prompt}]})
    });
    const raw=await r.text();
    if(!r.ok){let e=`HTTP ${r.status}`;try{e=JSON.parse(raw)?.error?.message||e;}catch{}throw new Error(e);}
    const data=JSON.parse(raw);
    const txt=data.content?.map(b=>b.text||"").join("")||"";
    const s=txt.indexOf("{"),e=txt.lastIndexOf("}");
    if(s===-1||e===-1)throw new Error("Kein JSON in Antwort");
    let parsed;
    try{ parsed=JSON.parse(txt.slice(s,e+1)); }
    catch(pe){
      // Try to recover truncated JSON by closing open arrays/objects
      let partial=txt.slice(s,e+1);
      try{
        const fixed=partial.replace(/,\s*$/, "")+"]}";;
        parsed=JSON.parse(fixed);
      }catch{ throw new Error("Antwort zu lang – bitte weniger Wochen im Zeitraum angeben"); }
    }
    if(!parsed.adjustments)throw new Error("Unvollständige Antwort");
    S.coachResult=parsed;
  }catch(err){S.coachErr="Fehler: "+err.message;}
  S.coachL=false;render();
}

    }else{

      S.coachResult.adjustments.forEach(adj=>{

          <div class="coach-change-desc">${(adj.description||"").slice(0,120)}${(adj.description||"").length>120?"…":""}</div>
          <div class="coach-change-reason">💡 ${adj.adjustment_reason}</div>`;
        list.appendChild(c);
      });
      res.appendChild(list);
    }

    const actions=el("div","coach-actions");
    const apply=el("button","coach-apply","✅ Übernehmen");

    disc.onclick=()=>{S.coachResult=null;render();};

        <div class="coach-hist-count">${h.count} Einheit(en) angepasst</div>`;
      hSec.appendChild(item);
    });
    d.appendChild(hSec);
  }

  return d;
}

function renderFTPChart(hist){
  const W=320,H=120,pad={t:10,r:10,b:30,l:40};
  const iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const ftps=hist.map(h=>h.ftp);
  const minF=Math.min(...ftps)-20, maxF=Math.max(...ftps)+20;
  const n=hist.length;

  let pts=hist.map((h,i)=>{
    const x=pad.l+(i/(n-1||1))*iW;
    const y=pad.t+iH-(h.ftp-minF)/(maxF-minF)*iH;
    return [x,y];
  });

  const pathD=pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  let dots=pts.map((p,i)=>`<circle class="dot-ftp" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4"/>
    <text x="${p[0].toFixed(1)}" y="${(p[1]-8).toFixed(1)}" style="font-size:9px;fill:#f97316;text-anchor:middle">${hist[i].ftp}W</text>`).join("");

  // X labels (dates)
  let xlabels=hist.map((h,i)=>{
    const x=pad.l+(i/(n-1||1))*iW;
    const d=h.date.slice(5); // MM-DD
    return `<text class="week-label" x="${x.toFixed(1)}" y="${H-4}">${d}</text>`;
  }).join("");

  // Y axis
  const yMid=Math.round((minF+maxF)/2);
  const yLabels=[minF,yMid,maxF].map(v=>{
    const y=pad.t+iH-(v-minF)/(maxF-minF)*iH;
    return `<text style="font-size:9px;fill:#475569;text-anchor:end" x="${pad.l-4}" y="${y.toFixed(1)+4}">${v}</text>`;
  }).join("");

  const svg=`<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${yLabels}${xlabels}
    <path class="line-ftp" d="${pathD}"/>
    ${dots}
  </svg>`;
  const wrap=el("div","chart-wrap"); wrap.innerHTML=svg; return wrap;
}

function getWeeks(n=8){
  // Returns array of {label, start, end} for last n weeks
  const weeks=[];
  const now=new Date(today+"T12:00:00");
  const dow=now.getDay()||7; // 1=Mon
  const monday=new Date(now); monday.setDate(now.getDate()-(dow-1));
  for(let i=n-1;i>=0;i--){
    const wStart=new Date(monday); wStart.setDate(monday.getDate()-i*7);
    const wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);
    const fmt=d=>d.toISOString().slice(0,10);
    weeks.push({label:`KW ${wStart.getDate()}.${wStart.getMonth()+1}`,start:fmt(wStart),end:fmt(wEnd)});
  }
  return weeks;
}

function renderWeeklyChart(){
  const weeks=getWeeks(8);
  const logs=S.logs;

  const data=weeks.map(w=>{
    let km=0,hm=0,min=0;
    Object.entries(logs).forEach(([d,l])=>{
      if(d>=w.start&&d<=w.end){
        km+=parseFloat(l.km||0);
        hm+=parseFloat(l.hm||0);
        min+=parseFloat(l.dur||0);
        (l.ex||[]).forEach(e=>{km+=parseFloat(e.km||0);hm+=parseFloat(e.hm||0);});
      }
    });
    return {label:w.label,km:Math.round(km*10)/10,hm:Math.round(hm),min:Math.round(min)};
  });

  const hasData=data.some(d=>d.km>0||d.hm>0);
  if(!hasData) return el("div","no-data","Noch keine Trainingsdaten vorhanden");

  const W=320,H=130,pad={t:10,r:10,b:30,l:40};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const n=data.length;
  const bW=(iW/n)*0.7, gap=(iW/n)*0.3;
  const maxKm=Math.max(...data.map(d=>d.km),1);
  const maxHm=Math.max(...data.map(d=>d.hm/10),1);
  const maxVal=Math.max(maxKm,maxHm);

  let bars="";
  data.forEach((d,i)=>{
    const cx=pad.l+(i+0.5)*(iW/n);
    const x=cx-bW/2;
    const kmH=d.km/maxVal*iH;
    const hmH=(d.hm/10)/maxVal*iH;
    bars+=`<rect x="${x.toFixed(1)}" y="${(pad.t+iH-kmH).toFixed(1)}" width="${(bW*0.48).toFixed(1)}" height="${kmH.toFixed(1)}" class="bar-km" rx="2"/>`;
    bars+=`<rect x="${(x+bW*0.52).toFixed(1)}" y="${(pad.t+iH-hmH).toFixed(1)}" width="${(bW*0.48).toFixed(1)}" height="${hmH.toFixed(1)}" class="bar-hm" rx="2"/>`;
    bars+=`<text class="week-label" x="${cx.toFixed(1)}" y="${H-4}">${d.label}</text>`;
    if(d.km>0) bars+=`<text style="font-size:8px;fill:#4ade80;text-anchor:middle" x="${(x+bW*0.24).toFixed(1)}" y="${(pad.t+iH-kmH-3).toFixed(1)}">${d.km}</text>`;
  });

  const svg=`<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
  const wrap=el("div","chart-wrap"); wrap.innerHTML=svg; return wrap;
}

function renderZoneDist(){
  // Map RPE to zones: 1-3=Z1, 4-5=Z2, 6-7=Z3, 8=Z4, 9=Z5, 10=Z5+
  const zoneCounts={Z1:0,Z2:0,Z3:0,Z4:0,Z5:0};
  const zoneColors={Z1:"#94a3b8",Z2:"#4ade80",Z3:"#facc15",Z4:"#f97316",Z5:"#fb7185"};
  let total=0;
  Object.values(S.logs).forEach(l=>{
    const rpe=parseInt(l.rpe||0);
    if(!rpe) return;
    let z="Z1";
    if(rpe<=3)z="Z1";else if(rpe<=5)z="Z2";else if(rpe<=7)z="Z3";else if(rpe<=8)z="Z4";else z="Z5";
    zoneCounts[z]++;total++;
  });

  if(total===0) return el("div","no-data","Noch keine RPE-Daten vorhanden");

  const wrap=el("div");
  // 80/20 indicator
  const z12=((zoneCounts.Z1+zoneCounts.Z2)/total*100).toFixed(0);
  const intense=((zoneCounts.Z3+zoneCounts.Z4+zoneCounts.Z5)/total*100).toFixed(0);
  const isGood=parseInt(z12)>=75;
  const badge=el("div","trend-badge");
  badge.style.cssText=`background:${isGood?"#052e16":"#1c0a00"};color:${isGood?"#4ade80":"#f97316"}`;
  badge.textContent=`80/20: ${z12}% locker / ${intense}% intensiv ${isGood?"✅":"⚠️"}`;
  wrap.appendChild(badge);

  Object.entries(zoneCounts).forEach(([z,count])=>{
    if(!count) return;
    const pct=(count/total*100).toFixed(0);
    const row=el("div","zone-row");
    row.innerHTML=`<div class="zone-name" style="color:${zoneColors[z]}">${z}</div>
      <div class="zone-bar-wrap"><div class="zone-bar" style="width:${pct}%;background:${zoneColors[z]}"></div></div>
      <div class="zone-watts">${pct}% (${count})</div>`;
    wrap.appendChild(row);
  });
  return wrap;
}

function renderLoadSection(){
  // Simple CTL/ATL/TSB approximation from RPE * duration
  const entries=Object.entries(S.logs).sort((a,b)=>a[0].localeCompare(b[0]));
  if(entries.length<3) return el("div","no-data","Mindestens 3 eingetragene Einheiten nötig");

  // TSS approximation: RPE/10 * duration_hours * 100
  const tssData=entries.map(([d,l])=>{
    const rpe=parseFloat(l.rpe||5);
    const hrs=parseFloat(l.dur||60)/60;
    return {date:d, tss: Math.round((rpe/10)*hrs*100)};
  });

  // CTL (42-day), ATL (7-day) exponential weighted moving average
  let ctl=0,atl=0;
  const ctlK=1/42, atlK=1/7;
  tssData.forEach(t=>{
    ctl = ctl*(1-ctlK)+t.tss*ctlK;
    atl = atl*(1-atlK)+t.tss*atlK;
  });
  const tsb=Math.round(ctl-atl);
  ctl=Math.round(ctl); atl=Math.round(atl);

  const tsbColor=tsb>5?"#4ade80":tsb>-10?"#facc15":tsb>-30?"#f97316":"#fb7185";
  const tsbLabel=tsb>5?"Frisch 🟢":tsb>-10?"Moderat 🟡":tsb>-30?"Müde 🟠":"Überbelastet 🔴";
  const formLabel=tsb>5?"Gute Form für Rennen/Tests":tsb>-10?"Normales Training möglich":tsb>-30?"Erholung empfohlen":"Unbedingt Pause!";

  const wrap=el("div");
  wrap.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;text-align:center">
      <div style="background:#1e293b;border-radius:10px;padding:12px">
        <div style="font-size:22px;font-weight:700;color:#4ade80">${ctl}</div>
        <div style="font-size:10px;color:#64748b;margin-top:2px">CTL<br>Fitness</div>
      </div>
      <div style="background:#1e293b;border-radius:10px;padding:12px">
        <div style="font-size:22px;font-weight:700;color:#f97316">${atl}</div>
        <div style="font-size:10px;color:#64748b;margin-top:2px">ATL<br>Fatigue</div>
      </div>
      <div style="background:#1e293b;border-radius:10px;padding:12px">
        <div style="font-size:22px;font-weight:700;color:${tsbColor}">${tsb>0?"+":""}${tsb}</div>
        <div style="font-size:10px;color:#64748b;margin-top:2px">TSB<br>Form</div>
      </div>
    </div>
    <div style="background:#1e293b;border-radius:10px;padding:12px;font-size:12px">
      <div style="color:${tsbColor};font-weight:700;margin-bottom:4px">${tsbLabel}</div>
      <div style="color:#64748b">${formLabel}</div>
    </div>
    <div style="font-size:10px;color:#334155;margin-top:8px;line-height:1.5">CTL=chronische Last (Fitness, 42 Tage), ATL=akute Last (Müdigkeit, 7 Tage), TSB=Form (CTL-ATL). Basiert auf RPE×Dauer-Schätzung.</div>`;
  return wrap;
}
