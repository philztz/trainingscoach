<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trainingscoach" />
  <meta name="theme-color" content="#030712" />
  <title>Trainingscoach</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #030712; color: #e2e8f0; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    input, button, textarea { -webkit-appearance: none; font-size: 16px !important; }
    #root { min-height: 100vh; }
    #loading { display:flex; align-items:center; justify-content:center; height:100vh; 
               color:#4ade80; font-family:monospace; font-size:16px; flex-direction:column; gap:12px; }
    #settings-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 9999; align-items: center; justify-content: center; padding: 20px;
    }
    #settings-overlay.open { display: flex; }
    #settings-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 20px;
      padding: 28px 24px; width: 100%; max-width: 380px;
    }
    #settings-box h2 { color: #f8fafc; font-size: 18px; margin-bottom: 6px; font-family: monospace; }
    #settings-box p { color: #64748b; font-size: 13px; margin-bottom: 20px; line-height: 1.6; font-family: monospace; }
    #api-key-input {
      width: 100%; padding: 12px 14px; background: #0f172a; border: 1px solid #334155;
      border-radius: 10px; color: #f8fafc; font-size: 14px; font-family: monospace;
      outline: none; margin-bottom: 12px;
    }
    .settings-btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 14px;
      font-family: monospace; font-weight: 700; cursor: pointer; margin-bottom: 10px;
    }
    #settings-status { font-size: 12px; color: #4ade80; margin-top: 8px; text-align: center; font-family: monospace; min-height: 20px; }
  </style>
</head>
<body>
  <div id="settings-overlay">
    <div id="settings-box">
      <h2>🔑 API-Key einrichten</h2>
      <p>Für die KI-Analyse benötigst du einen Anthropic API-Key.<br><br>
         Kostenlos erstellen auf:<br><b style="color:#818cf8">console.anthropic.com</b><br><br>
         (ca. 1–2€/Monat bei täglicher Nutzung)</p>
      <input id="api-key-input" type="password" placeholder="sk-ant-..." />
      <button class="settings-btn" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white" onclick="saveApiKey()">💾 Key speichern</button>
      <button class="settings-btn" style="background:#0f172a;color:#64748b;border:1px solid #334155;margin-bottom:0" onclick="closeSettings()">Schließen</button>
      <div id="settings-status"></div>
    </div>
  </div>

  <div id="loading">
    <div style="font-size:32px">🚴</div>
    <div>Trainingscoach lädt...</div>
  </div>
  <div id="root" style="display:none"></div>

  <script>
    function getApiKey() { return localStorage.getItem("anthropic_api_key") || ""; }
    function saveApiKey() {
      const key = document.getElementById("api-key-input").value.trim();
      if (!key.startsWith("sk-ant-")) {
        document.getElementById("settings-status").textContent = "⚠️ Key muss mit sk-ant- beginnen";
        document.getElementById("settings-status").style.color = "#fb7185";
        return;
      }
      localStorage.setItem("anthropic_api_key", key);
      document.getElementById("settings-status").textContent = "✅ Gespeichert!";
      setTimeout(closeSettings, 1000);
    }
    function openSettings() {
      document.getElementById("api-key-input").value = getApiKey();
      document.getElementById("settings-status").textContent = "";
      document.getElementById("settings-overlay").classList.add("open");
    }
    function closeSettings() {
      document.getElementById("settings-overlay").classList.remove("open");
    }
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(()=>{}));
    }
  </script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone - load async, show loading indicator -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js" onload="initApp()" onerror="showError()"></script>

  <script>
    function showError() {
      document.getElementById("loading").innerHTML = 
        '<div style="font-size:32px">❌</div><div>Ladefehler – bitte Seite neu laden</div>' +
        '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#4f46e5;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">🔄 Neu laden</button>';
    }

    function initApp() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("root").style.display = "block";

      const code = document.getElementById("app-code").textContent;
      const transformed = Babel.transform(code, { presets: ["react"] }).code;
      const fn = new Function("React", "ReactDOM", "openSettings", "getApiKey", transformed);
      fn(React, ReactDOM, openSettings, getApiKey);
    }
  </script>

function formatDate(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

function getTodayStr() {
  return new Date().toISOString().slice(0, 10);
}

function loadStorage(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}

function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

                placeholder="Wie lief es? Besonderheiten? Schmerzen?"
                rows={3}
                style={{ width: "100%", padding: "11px 14px", background: "#1e293b", border: "1px solid #334155", borderRadius: 10, color: "#f8fafc", fontSize: 14, fontFamily: "inherit", outline: "none", resize: "none", boxSizing: "border-box" }} />
            </div>

            {/* Andere Einheit */}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 11, color: "#64748b", letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 8 }}>Andere Einheit gemacht?</label>
              {!logForm.actualType ? (
                <button onClick={() => setLogForm(f => ({ ...f, actualType: "ride" }))}
                  style={{ width: "100%", padding: "10px", background: "#1e293b", border: "1px dashed #334155", borderRadius: 10, color: "#64748b", fontSize: 13, fontFamily: "inherit", cursor: "pointer" }}>
                  + Abweichung eintragen
                </button>
              ) : (
                <div style={{ background: "#1e293b", border: "1px solid #f97316aa", borderRadius: 12, padding: 14 }}>
                  <div style={{ fontSize: 12, color: "#f97316", marginBottom: 10, fontWeight: 600 }}>🔄 Abweichung vom Plan</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                    {[["ride","🚴","Rad"],["run","🏃","Laufen"],["strength","💪","Kraft"],["intervals","⚡","Intervalle"],["hiit","🔥","HIIT"],["mobility","🧘","Mobility"],["rest","😴","Ruhe"]].map(([t,ic,lb]) => (
                      <button key={t} onClick={() => setLogForm(f => ({ ...f, actualType: t }))}
                        style={{ padding: "6px 12px", borderRadius: 20, border: `2px solid ${logForm.actualType === t ? (TYPE_META[t]?.color || "#f97316") : "#334155"}`, background: logForm.actualType === t ? (TYPE_META[t]?.bg || "#1c0a00") : "transparent", color: logForm.actualType === t ? (TYPE_META[t]?.color || "#f97316") : "#64748b", fontSize: 12, fontFamily: "inherit", cursor: "pointer" }}>
                        {ic} {lb}
                      </button>
                    ))}
                  </div>
                  <input value={logForm.actualLabel} onChange={e => setLogForm(f => ({ ...f, actualLabel: e.target.value }))}
                    placeholder="Beschreibung (z.B. Spontanausfahrt 40km)"
                    style={{ width: "100%", padding: "8px 12px", background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#f8fafc", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                    {[["actualDuration","⏱ Dauer (Min)","90"],["actualKm","📍 Kilometer","40"],["actualHm","⛰️ Höhenmeter","300"],["actualHr","❤️ Ø HF (bpm)","145"],["actualRpe","💪 RPE (1–10)","7"]].map(([field, label, ph]) => (
                      <div key={field}>
                        <div style={{ fontSize: 10, color: "#475569", marginBottom: 3 }}>{label}</div>
                        <input type="number" value={logForm[field]||""} onChange={e => setLogForm(f => ({ ...f, [field]: e.target.value }))} placeholder={ph}
                          style={{ width: "100%", padding: "7px 10px", background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#f8fafc", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                      </div>
                    ))}
                  </div>
                  <button onClick={() => setLogForm(f => ({ ...f, actualType: null, actualLabel: "", actualDuration: "", actualKm: "", actualHm: "", actualHr: "", actualRpe: "" }))}
                    style={{ fontSize: 11, color: "#475569", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>
                    ✕ Abweichung entfernen
                  </button>
                </div>
              )}
            </div>

            {/* Zusätzliche Einheiten */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <label style={{ fontSize: 11, color: "#64748b", letterSpacing: 1, textTransform: "uppercase" }}>Zusätzliche Einheiten</label>
                <button onClick={addExtra} style={{ fontSize: 12, color: "#4ade80", background: "none", border: "1px solid #4ade8044", borderRadius: 20, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" }}>+ Hinzufügen</button>
              </div>
              {extraWorkouts.length === 0 && (
                <div style={{ fontSize: 12, color: "#334155", textAlign: "center", padding: "10px 0" }}>Noch keine zusätzlichen Einheiten</div>
              )}
              {extraWorkouts.map((ex, i) => (
                <div key={i} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 12, padding: 14, marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <span style={{ fontSize: 12, color: "#4ade80", fontWeight: 600 }}>➕ Einheit {i + 1}</span>
                    <button onClick={() => removeExtra(i)} style={{ fontSize: 11, color: "#475569", background: "none", border: "none", cursor: "pointer", fontFamily: "inherit" }}>✕ Entfernen</button>
                  </div>
                  {/* Type selector */}
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                    {[["ride","🚴","Rad"],["run","🏃","Laufen"],["strength","💪","Kraft"],["intervals","⚡","Intervalle"],["hiit","🔥","HIIT"],["mobility","🧘","Mobility"]].map(([t,ic,lb]) => (
                      <button key={t} onClick={() => updateExtra(i, "type", t)}
                        style={{ padding: "5px 10px", borderRadius: 20, border: `2px solid ${ex.type === t ? (TYPE_META[t]?.color||"#4ade80") : "#334155"}`, background: ex.type === t ? (TYPE_META[t]?.bg||"#052e16") : "transparent", color: ex.type === t ? (TYPE_META[t]?.color||"#4ade80") : "#64748b", fontSize: 11, fontFamily: "inherit", cursor: "pointer" }}>
                        {ic} {lb}
                      </button>
                    ))}
                  </div>
                  {/* Label */}
                  <input value={ex.label} onChange={e => updateExtra(i, "label", e.target.value)} placeholder="Beschreibung (z.B. Abendlauf 8km)"
                    style={{ width: "100%", padding: "8px 12px", background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#f8fafc", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
                  {/* Metrics grid */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {[["duration","⏱ Dauer (Min)","90"],["km","📍 Kilometer","40"],["hm","⛰️ Höhenmeter","300"],["hr","❤️ Ø HF (bpm)","145"],["rpe","💪 RPE (1–10)","7"]].map(([field, label, ph]) => (
                      <div key={field}>
                        <div style={{ fontSize: 10, color: "#475569", marginBottom: 3 }}>{label}</div>
                        <input type="number" value={ex[field]||""} onChange={e => updateExtra(i, field, e.target.value)} placeholder={ph}
                          style={{ width: "100%", padding: "7px 10px", background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#f8fafc", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                      </div>
                    ))}
                    <div>
                      <div style={{ fontSize: 10, color: "#475569", marginBottom: 3 }}>📝 Notiz</div>
                      <input value={ex.notes||""} onChange={e => updateExtra(i, "notes", e.target.value)} placeholder="Optional"
                        style={{ width: "100%", padding: "7px 10px", background: "#0f172a", border: "1px solid #334155", borderRadius: 8, color: "#f8fafc", fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <button onClick={() => saveLog(false)}
              style={{ width: "100%", padding: 14, background: "linear-gradient(135deg, #16a34a, #15803d)", color: "white", border: "none", borderRadius: 12, fontSize: 15, fontFamily: "inherit", fontWeight: 700, cursor: "pointer", letterSpacing: 0.5 }}>
              {logSaved ? "✅ Gespeichert!" : "💾 Training speichern"}
            </button>
            {logSaved && (
              <button onClick={() => { setView("today"); }}
                style={{ width: "100%", marginTop: 10, padding: 12, background: "linear-gradient(135deg, #4f46e5, #7c3aed)", color: "white", border: "none", borderRadius: 12, fontSize: 14, fontFamily: "inherit", fontWeight: 700, cursor: "pointer" }}>
                🤖 Gesamtplan analysieren & optimieren →
              </button>
            )}
          </div>
        )}

        {/* PLAN VIEW */}
        {view === "plan" && (
          <div>
            <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Gesamtplan – alle Einheiten</div>
            {PLAN.map((w, i) => {
              const m = TYPE_META[w.type] || TYPE_META.rest;
              const override = overrides[w.date];
              const hasLog = !!logs[w.date];
              const isToday = w.date === today;
              const isPast = w.date < today;
              return (
                <button key={i} onClick={() => { setSelectedDate(w.date); setView("today"); }}
                  style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: isToday ? m.bg : "#0f172a", border: `1px solid ${isToday ? m.color + "44" : "#1e293b"}`, borderRadius: 12, marginBottom: 8, cursor: "pointer", opacity: isPast ? 0.6 : 1, transition: "all 0.15s", textAlign: "left" }}>
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{m.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 11, color: "#475569" }}>{formatDate(w.date)}</div>
                    <div style={{ fontSize: 13, color: isToday ? m.color : "#e2e8f0", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {override ? "🤖 " : ""}{(override || w).label}
                    </div>
                    <div style={{ fontSize: 11, color: "#475569" }}>{w.phase}</div>
                  </div>
                  <div style={{ flexShrink: 0, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                    {hasLog && <span style={{ fontSize: 10, color: "#4ade80" }}>✓</span>}
                    {w.duration > 0 && <span style={{ fontSize: 11, color: "#475569" }}>{w.duration}′</span>}
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(TrainingsApp));
  </script>
</body>
</html>
